kind = "web"
previewPath = "/"
title = "SentinelGrid"
version = "1.0.0"
id = "artifacts/sentinel-grid"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20581

[services.development]
run = "pnpm --filter @workspace/sentinel-grid run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sentinel-grid", "run", "build" ]
serve = "static"
publicDir = "artifacts/sentinel-grid/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20581"
BASE_PATH = "/"
